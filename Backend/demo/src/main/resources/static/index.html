<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ETTIway - Campus Navigation</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Toggle sidebar">â˜°</button>
    <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>
    <div id="sidebar">
        <div class="sidebar-header">
            <h1>ETTIway</h1>
            <p class="subtitle">Campus Navigation</p>
            <p id="logged-user" class="logged-user" style="display: none;"></p>
            <form action="/logout" method="post" class="logout-form">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Cauta pe ETTIway" />
        </div>
        <div id="room-details">
            <h3>Building Details</h3>
            <p class="info-text">Click on a building to view details</p>
        </div>
        <div id="room-list">
            <h3>Available Buildings</h3>
            <div id="room-list-container">
                <p class="info-text">Loading buildings...</p>
            </div>
        </div>
    </div>
    <div id="map"></div>
    <div id="geo-warning" style="display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; padding: 10px 20px; background: rgba(231, 76, 60, 0.95); color: white; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; pointer-events: none; transition: opacity 0.3s ease;">
        AtenÈ›ie: Ai pÄƒrÄƒsit perimetrul campusului ETTI.
    </div>
    <button id="find-me-btn" onclick="toggleLocation()" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; padding: 12px 24px; background: #3498db; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: background 0.3s ease;">
        Find Me
    </button>
    <button id="test-mode-btn" onclick="toggleTestModeGlobal()" style="position: absolute; bottom: 20px; left: 20px; z-index: 1000; padding: 10px 15px; background: #e67e22; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
        Dev: Test Mode OFF
    </button>
    <div id="indoor-modal" class="indoor-modal">
        <div class="indoor-content">
            <div class="indoor-header">
                <h2 id="indoor-title">Floor Plan</h2>
                <div style="display: flex; gap: 10px;">
                    <button id="indoor-save-btn" class="runtime-btn" style="display: none;">Save Plan</button>
                    <span class="close-modal" onclick="closeIndoor()">&times;</span>
                </div>
            </div>
            <div id="indoor-controls" class="indoor-controls">
            </div>
            <div id="indoor-map"></div>
        </div>
    </div>
    <div id="floor-manager-modal" class="indoor-modal">
        <div class="indoor-content" style="max-width: 600px; height: auto; max-height: 80vh;">
            <div class="indoor-header">
                <h2>Floor Manager</h2>
                <span class="close-modal" onclick="closeFloorManager()">&times;</span>
            </div>
            <div style="padding: 20px; color: #2c3e50; overflow-y: auto;">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: bold;">Select Building:</label>
                    <select id="floor-manager-building-select" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                        <option value="">-- Select a Building --</option>
                    </select>
                </div>
                <div id="floor-manager-controls" style="display: none; margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: bold;">Number of Floors:</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <input type="number" id="floor-manager-count" min="1" max="20" value="1" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                        <button id="floor-manager-update-btn" style="background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">Update</button>
                    </div>
                </div>
                <div id="floor-list-container" style="border-top: 1px solid #eee; padding-top: 15px;">
                    <h3 style="font-size: 16px; margin-bottom: 10px;">Floors</h3>
                    <div id="floor-manager-list" style="display: flex; flex-direction: column; gap: 10px;">
                        <p style="color: #7f8c8d; font-style: italic;">Select a building to view floors.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    <script src="js/graph-editor.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/routing.js"></script>
    <script src="js/indoor.js"></script>
    <script src="js/map.js"></script>
    <script src="js/main.js"></script>
    <script>
        async function loadLoggedUser() {
            try {
                const response = await fetch('/api/auth/me', {
                    method: 'GET',
                    credentials: 'same-origin'
                });
                if (!response.ok) {
                    return;
                }
                const data = await response.json();
                if (data && data.authenticated && data.username) {
                    const userEl = document.getElementById('logged-user');
                    const role = (data.role || 'ROLE_USER').replace('ROLE_', '');
                    userEl.textContent = 'Logat ca: ' + data.username + ' (' + role + ')';
                    userEl.style.display = 'block';
                }
            } catch (error) {
                console.warn('Nu am putut Ã®ncÄƒrca utilizatorul curent.', error);
            }
        }
        loadLoggedUser();
    </script>
</body>
</html>
