<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETTIway - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .card {
            background-color: #2c3e50;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            color: #ecf0f1;
        }
        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .card-header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-header p {
            font-size: 14px;
            color: #bdc3c7;
        }
        .error-message {
            display: none;
            margin-bottom: 16px;
            padding: 10px 12px;
            border-radius: 4px;
            background-color: #c0392b;
            color: #ecf0f1;
            font-size: 14px;
        }
        .error-message.show {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #ecf0f1;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #34495e;
            border-radius: 4px;
            background-color: #34495e;
            color: #ecf0f1;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background-color: #3e5871;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        button,
        .btn-secondary {
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background-color: #34495e;
            color: #3498db;
            border: 1px solid #3498db;
        }
        .btn-secondary:hover {
            background-color: #3e5871;
            transform: translateY(-2px);
        }
        .register-link {
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
            color: #bdc3c7;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .register-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card">
            <div class="card-header">
                <h1>ETTIway</h1>
                <p>Sign in to your account</p>
            </div>
            <div id="login-error" class="error-message">User sau parola gresit</div>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="off"
                        placeholder="Enter your username"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="new-password"
                        placeholder="Enter your password"
                        required
                    >
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-primary">Login</button>
                    <a href="/auth.html" class="btn-secondary">Create Account</a>
                </div>
            </form>
            <div class="register-link">
                Don't have an account? <a href="/auth.html">Sign Up here</a>
            </div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === 'true' || params.has('error')) {
            document.getElementById('login-error').classList.add('show');
        }
    </script>
</body>
</html>
