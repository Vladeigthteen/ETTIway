<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETTIway - Sign Up</title>
    <style>
        /* Global styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Auth Container */
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        /* Card styles */
        .card {
            background-color: #2c3e50;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            color: #ecf0f1;
        }
        /* Header */
        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .card-header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-header p {
            font-size: 14px;
            color: #bdc3c7;
        }
        /* Form group */
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #ecf0f1;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #34495e;
            border-radius: 4px;
            background-color: #34495e;
            color: #ecf0f1;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background-color: #3e5871;
        }
        /* Checkbox group */
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: #667eea;
        }
        .checkbox-group label {
            margin-bottom: 0;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            color: #ecf0f1;
        }
        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button,
        .btn-link {
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background-color: #34495e;
            color: #3498db;
            border: 1px solid #3498db;
        }
        .btn-secondary:hover {
            background-color: #3e5871;
            transform: translateY(-2px);
        }
        /* Loading state */
        .btn-primary.loading {
            opacity: 0.7;
            pointer-events: none;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Error message */
        .error-message {
            background-color: #c0392b;
            color: #ecf0f1;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        /* Success message */
        .success-message {
            background-color: #27ae60;
            color: #ecf0f1;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        /* Links */
        .login-link {
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
            color: #bdc3c7;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .login-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card">
            <div class="card-header">
                <h1>ETTIway</h1>
                <p>Create your account</p>
            </div>
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <form id="signupForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        autocomplete="off"
                        placeholder="Enter your username" 
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        autocomplete="new-password"
                        placeholder="Enter your password" 
                        required
                    >
                </div>
                <div class="checkbox-group">
                    <input 
                        type="checkbox" 
                        id="isAdmin" 
                        name="isAdmin"
                    >
                    <label for="isAdmin">Administrator Account</label>
                </div>
                <div class="button-group">
                    <button 
                        type="submit" 
                        class="btn-primary" 
                        id="signupBtn"
                    >
                        Sign Up
                    </button>
                    <a href="/login.html" class="btn-secondary">
                        Go to Login
                    </a>
                </div>
            </form>
            <div class="login-link">
                Already have an account? <a href="/login.html">Login here</a>
            </div>
        </div>
    </div>
    <script>
        // Get form elements
        const signupForm = document.getElementById('signupForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const isAdminCheckbox = document.getElementById('isAdmin');
        const signupBtn = document.getElementById('signupBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        // Handle form submission
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            // Clear previous messages
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';
            successMessage.classList.remove('show');
            successMessage.textContent = '';
            // Validate inputs
            if (!usernameInput.value.trim()) {
                showError('Username is required');
                return;
            }
            if (!passwordInput.value.trim()) {
                showError('Password is required');
                return;
            }
            if (passwordInput.value.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }
            // Disable button and show loading state
            signupBtn.disabled = true;
            signupBtn.classList.add('loading');
            const originalText = signupBtn.textContent;
            signupBtn.innerHTML = '<span class="spinner"></span>Signing up...';
            try {
                // Prepare data
                const data = {
                    username: usernameInput.value.trim(),
                    password: passwordInput.value,
                    isAdmin: isAdminCheckbox.checked
                };
                // Send request to backend
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                // Handle response
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(
                        errorData.message || 
                        `Sign up failed: ${response.status} ${response.statusText}`
                    );
                }
                // Show success message
                showSuccess('Sign up successful! Redirecting to login...');
                // Reset form
                signupForm.reset();
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
            } catch (error) {
                console.error('Sign up error:', error);
                showError(error.message || 'An error occurred during sign up. Please try again.');
            } finally {
                // Re-enable button
                signupBtn.disabled = false;
                signupBtn.classList.remove('loading');
                signupBtn.textContent = originalText;
            }
        });
        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        // Show success message
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            successMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        // Clear error on input change
        usernameInput.addEventListener('input', () => {
            if (errorMessage.classList.contains('show')) {
                errorMessage.classList.remove('show');
            }
        });
        passwordInput.addEventListener('input', () => {
            if (errorMessage.classList.contains('show')) {
                errorMessage.classList.remove('show');
            }
        });
    </script>
</body>
</html>
