<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">

<text x="340" y="30" font-family="sans-serif" font-size="14" font-weight="500" fill="#3D3D3A" text-anchor="middle">Principiul trilaterării GPS</text>

<!-- Cercurile de distanță -->
<circle cx="220" cy="240" r="130" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>
<circle cx="460" cy="240" r="120" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>
<circle cx="340" cy="350" r="110" fill="none" stroke="#993556" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>

<!-- Liniile de distanță -->
<line x1="220" y1="100" x2="345" y2="248" stroke="#185FA5" stroke-width="1" opacity="0.5"/>
<line x1="500" y1="120" x2="345" y2="248" stroke="#0F6E56" stroke-width="1" opacity="0.5"/>
<line x1="280" y1="420" x2="345" y2="252" stroke="#993556" stroke-width="1" opacity="0.5"/>

<!-- Etichete distanțe -->
<text x="265" y="180" font-family="sans-serif" font-size="12" fill="#185FA5" font-weight="500">d₁</text>
<text x="415" y="195" font-family="sans-serif" font-size="12" fill="#0F6E56" font-weight="500">d₂</text>
<text x="305" y="330" font-family="sans-serif" font-size="12" fill="#993556" font-weight="500">d₃</text>

<!-- Satelit 1 -->
<circle cx="220" cy="100" r="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
<text x="220" y="100" font-family="sans-serif" font-size="12" fill="#0C447C" font-weight="500" text-anchor="middle" dominant-baseline="central">S₁</text>
<text x="220" y="78" font-family="sans-serif" font-size="12" fill="#185FA5" text-anchor="middle">Satelit 1</text>

<!-- Satelit 2 -->
<circle cx="500" cy="120" r="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="500" y="120" font-family="sans-serif" font-size="12" fill="#085041" font-weight="500" text-anchor="middle" dominant-baseline="central">S₂</text>
<text x="500" y="98" font-family="sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle">Satelit 2</text>

<!-- Satelit 3 -->
<circle cx="280" cy="420" r="14" fill="#FBEAF0" stroke="#993556" stroke-width="1.5"/>
<text x="280" y="420" font-family="sans-serif" font-size="12" fill="#72243E" font-weight="500" text-anchor="middle" dominant-baseline="central">S₃</text>
<text x="280" y="445" font-family="sans-serif" font-size="12" fill="#993556" text-anchor="middle">Satelit 3</text>

<!-- Utilizator (punct galben) -->
<circle cx="345" cy="250" r="8" fill="#FFD93D" stroke="#7A6209" stroke-width="2"/>
<text x="345" y="225" font-family="sans-serif" font-size="14" font-weight="500" fill="#3D3D3A" text-anchor="middle">Utilizator</text>

<!-- Legenda jos -->
<rect x="40" y="395" width="180" height="60" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="55" y="415" font-family="sans-serif" font-size="12" fill="#444441" font-weight="500">Distanțe măsurate:</text>
<text x="55" y="432" font-family="sans-serif" font-size="12" fill="#185FA5">d₁ = c × Δt₁</text>
<text x="55" y="448" font-family="sans-serif" font-size="12" fill="#5F5E5A">c = viteza luminii</text>

</svg>
